body:
    - type: input
      attributes:
          name: cache_ttl_minutes
          label: "缓存时间 (分钟):"
          description: "仓库缓存有效期，默认30分钟"
          defaultValue: "30"
    - type: input
      attributes:
          name: max_results
          label: "最大结果数:"
          description: "搜索返回的最大结果数量"
          defaultValue: "20"
    - type: textBlock
      attributes:
          description: "账号配置 - 支持多账号，每个账号独立 Token 和 Chrome Profile"
    - type: textarea
      attributes:
          name: accounts_json
          label: "账号配置 (JSON):"
          description: "JSON 格式多账号配置"
          defaultValue: "[]"
    - type: textBlock
      attributes:
          description: "配置示例: [{\"alias\": \"Personal\", \"token\": \"ghp_xxx\", \"chrome_profile_path\": \"C:\\\\Users\\\\...\\\\Profile 1\"}]"
