body:
    - type: input
      attributes:
          name: cache_ttl_minutes
          label: "Cache TTL (minutes):"
          description: "Repository cache validity period, default 30 minutes"
          defaultValue: "30"
    - type: input
      attributes:
          name: max_results
          label: "Max results:"
          description: "Maximum number of search results"
          defaultValue: "20"
    - type: input
      attributes:
          name: language
          label: "UI Language (en/zh/ja):"
          description: "Select UI language"
          defaultValue: "en"
    - type: textBlock
      attributes:
          description: "Account configuration - supports multiple accounts, each with independent Token and Chrome Profile"
    - type: textarea
      attributes:
          name: accounts_json
          label: "Account config (JSON):"
          description: "JSON format multi-account configuration"
          defaultValue: "[]"
    - type: textBlock
      attributes:
          description: 'Example: [{"alias": "Personal", "token": "ghp_xxx", "chrome_profile_path": "C:\\Users\\...\\Profile 1"}]'